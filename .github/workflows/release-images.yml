name: Release Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag for the release (e.g. 0.11.1)'
        required: true

env:
  IMAGE_ORG: chandra25ms
  IMAGE_REPO: autotune_operator

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: kruize/autotune
          ref: mvp_demo
          path: autotune

      - name: Build image using build.sh
        run: |
          cd autotune
          ./build.sh -i quay.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:${{ github.event.inputs.image_tag }}

      - name: Log in to quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to docker.io
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push images
        run: |
          SOURCE_IMAGE="quay.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:${{ github.event.inputs.image_tag }}"

          # Push the versioned image to quay.io
          docker push "${SOURCE_IMAGE}"

          # quay.io additional tags
          docker tag "${SOURCE_IMAGE}" quay.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:latest
          docker push quay.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:latest

          docker tag "${SOURCE_IMAGE}" quay.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:demo
          docker push quay.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:demo

          # docker.io tags
          docker tag "${SOURCE_IMAGE}" docker.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:${{ github.event.inputs.image_tag }}
          docker push docker.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:${{ github.event.inputs.image_tag }}

          docker tag "${SOURCE_IMAGE}" docker.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:latest
          docker push docker.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:latest

          docker tag "${SOURCE_IMAGE}" docker.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:demo
          docker push docker.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_REPO }}:demo
